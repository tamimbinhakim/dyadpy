[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "dyadpy"
version = "0.3.0"
description = "Deprecated shim. dyadpy has been merged into causeway as causeway._runtime — install 'causeway' instead."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Tamim Bin Hakim", email = "tamimbinhakim@users.noreply.github.com" }]
keywords = ["deprecated", "causeway", "compat-shim"]
classifiers = [
  "Development Status :: 7 - Inactive",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = ["causeway>=0.5"]

[project.urls]
Homepage = "https://github.com/tamimbinhakim/causeway"
Documentation = "https://github.com/tamimbinhakim/causeway/tree/main/docs"
Repository = "https://github.com/tamimbinhakim/causeway"
Issues = "https://github.com/tamimbinhakim/causeway/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/dyadpy"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/README.md", "/CHANGELOG.md"]
