# Mirrors the husky/lint-staged pipeline for Python-first contributors who
# prefer the `pre-commit` framework. Either is fine. Both wired up = belt + suspenders.
# https://pre-commit.com/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^packages/dyadpy/
      - id: ruff-format
        files: ^packages/dyadpy/

  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: pnpm commitlint --edit
        language: system
        stages: [commit-msg]
