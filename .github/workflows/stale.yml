name: Stale issues

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good-first-issue,help-wanted
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 14 days if no further activity occurs.
            If it is still relevant, comment to keep it open.
          close-issue-message: >
            Closing as stale. If this is still an issue, please reopen with updated context.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 14 days if no further activity occurs.
